<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web AI Bot</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 2rem; background-color: #f4f4f4; }
    #chatbox { max-width: 600px; margin: auto; background: white; padding: 1rem; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    .message { margin: 1rem 0; }
    .user { color: blue; font-weight: bold; }
    .bot { color: green; }
    textarea { width: 100%; padding: 0.5rem; }
    button { padding: 0.5rem 1rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div id="chatbox">
    <h2>Ask the AI</h2>
    <div id="messages"></div>
    <textarea id="userInput" rows="3" placeholder="Ask me anything..."></textarea><br>
    <button onclick="sendMessage()">Send</button>
  </div>

  <script>
    const apiKey = 'YOUR_OPENAI_API_KEY'; // Replace with your actual OpenAI API key

    async function sendMessage() {
      const input = document.getElementById('userInput').value;
      if (!input) return;

      const messagesDiv = document.getElementById('messages');
      messagesDiv.innerHTML += `<div class='message'><span class='user'>You:</span> ${input}</div>`;
      document.getElementById('userInput').value = '';

      const response = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: 'gpt-3.5-turbo',
          messages: [{ role: 'user', content: input }]
        })
      });

      const data = await response.json();
      const reply = data.choices[0].message.content;
      messagesDiv.innerHTML += `<div class='message'><span class='bot'>Bot:</span> ${reply}</div>`;
    }
  </script>
</body>
</html>
